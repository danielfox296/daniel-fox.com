<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{title}}</title>
  <meta name="description" content="{{meta_description}}">
  <meta name="robots" content="{{robots}}">
  <link rel="canonical" href="{{canonical}}">

  <meta property="og:type" content="{{og_type}}">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{meta_description}}">
  <meta property="og:url" content="{{canonical}}">
  <meta property="og:image" content="{{og_image}}">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;1,400&family=PT+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{nav_prefix}}styles.css?v=20260613">
  {{schema}}
  {{ga}}
  {{page_css}}
</head>
<body{{body_attr}}>
  {{header}}
  <main>
    {{content}}
  </main>
  {{footer}}

  <script>
    // Mobile nav toggle
    (function () {
      var btn = document.querySelector('.nav-toggle');
      var links = document.querySelector('.nav-links');
      if (btn && links) {
        btn.addEventListener('click', function () {
          var open = links.classList.toggle('open');
          btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        });
      }
    })();
    // Reveal on scroll — with a hard failsafe so content can never stay hidden.
    (function () {
      var els = document.querySelectorAll('.reveal');
      if (!els.length) { return; }
      function showAll() { els.forEach(function (el) { el.classList.add('in'); }); }
      if (!('IntersectionObserver' in window)) { showAll(); return; }
      // threshold 0: reveal as soon as any part enters — works for elements taller than the viewport.
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
        });
      }, { threshold: 0, rootMargin: '0px 0px -10% 0px' });
      els.forEach(function (el) { io.observe(el); });
      // Failsafe: reveal anything still hidden shortly after load, regardless of observer behavior.
      window.addEventListener('load', function () { setTimeout(showAll, 1200); });
    })();
  </script>
</body>
</html>
