name: Deploy daniel-fox.com

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site
        run: python3 build.py

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r *.html styles.css CNAME _site/ 2>/dev/null || true
          cp -r sitemap.xml *.txt _site/ 2>/dev/null || true
          cp -r img _site/img 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
